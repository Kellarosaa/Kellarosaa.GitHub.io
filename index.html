<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  #fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
  }
  .fullscreen-button {
    padding: 10px 20px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>
<body>
<button onclick="toggleVisibility()"><button class="hidden" class="fullscreen-button" onclick="openFullscreen()">Open Fullscreen</button>
<iframe id="fullscreen"></iframe>
<script>
  function openFullscreen() {
    var iframe = document.getElementById('fullscreen');
    iframe.src = 'https://appetize.io/embed/xc1w6f1krd589zhp22a0mgftyw?autoplay=false&debug=true&device=ipad9thgeneration&embed=true&launchUrl=exp%3A%2F%2Fexp.host%2F%40iryna_dehtiarenko%2Fmy-first-app%2BCjSVYNgeok&scale=81&screenOnly=false&xDocMsg=true&xdocMsg=true&params=%7B%22EXDevMenuDisableAutoLaunch%22%3Atrue%2C%22EXKernelLaunchUrlDefaultsKey%22%3A%22exp%3A%2F%2Fexp.host%2F%40iryna_dehtiarenko%2Fmy-first-app%2BCjSVYNgeok%22%2C%22EXKernelDisableNuxDefaultsKey%22%3Atrue%7D&osVersion=16.2';
    iframe.requestFullscreen();
  }
</script>
</body>
</html>

<script>
function toggleVisibility() {
  var buttons = document.querySelectorAll('.hidden');
  buttons.forEach(button => {
    button.style.display = button.style.display === 'none' ? 'block' : 'none';
  });
}
</script>
</body>
