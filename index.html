    <title>Dropdown Menu with Script Buttons</title>
    <script>
        function runScript1() {
            alert('Script 1 executed!');
        }

        function runScript2() {
            alert('Script 2 executed!');
        }

        function runScript3() {
            alert('Script 3 executed!');
        }
    </script>
</head>
<body>
    <h1>Dropdown Menu with Script Buttons</h1>
    <div class="dropdown">
        <button class="dropbtn">Select Script</button>
        <div class="dropdown-content">
            <button onclick="runScript1()">Script 1</button>
            <button onclick="runScript2()">Script 2</button>
            <button onclick="runScript3()">Script 3</button>
        </div>
    </div>
</body>
