 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Image Menu</title>
<style>
    .menu {
        position: relative;
        display: inline-block;
    }
    .menu-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        z-index: 1;
    }
    .menu:hover .menu-content {
        display: block;
    }
    .menu-content button {
        display: block;
        width: 100%;
    }
    .image-container {
        display: none;
        position: absolute;
    }
</style>
</head>
<body>
    <div class="menu">
        <button>Menu</button>
        <div class="menu-content">
            <button onclick="displayImage('image1')">subway surfers</button>
            <button onclick="displayImage('image2')">Button 2</button>
            <button onclick="displayImage('image3')">Button 3</button>
        </div>
    </div>
    <div id="image1" class="image-container">
        <a href="https://kellarosaa.github.io/Subway/">
            <img src="https://raw.githubusercontent.com/Kellarosaa/Kellarosaa.GitHub.io/main/IMG_2139.jpeg" alt="Image 1" style="top: 100px; right: 100px;">
        </a>
    </div>
    <div id="image2" class="image-container">
        <a href="https://www.example2.com">
            <img src="image2.jpg" alt="Image 2" style="top: 150px; left: 100px;">
        </a>
    </div>
    <div id="image3" class="image-container">
        <a href="https://www.example3.com">
            <img src="image3.jpg" alt="Image 3" style="top: 200px; left: 150px;">
        </a>
    </div>
    <script>
        function displayImage(imageId) {
            var imageDiv = document.getElementById(imageId);
            if (imageDiv.style.display === "none") {
                imageDiv.style.display = "block";
            } else {
                imageDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
