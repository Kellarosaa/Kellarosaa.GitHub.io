<style>
    .menu {
        position: fixed;
        bottom: 10px;
        left: 10px;
        background: #f0f0f0;
        padding: 10px;
        border-radius: 5px;
        display: none; /* Initially hidden */
    }
    .menu button {
        display: block;
        margin-bottom: 5px;
        padding: 5px 10px;
        background: #3498db;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="menu" id="menu">
    <button onclick="toggleMenu()">Open Menu</button>
    <button onclick="runCode1()">Action 1</button>
    <button onclick="runCode2()">Action 2</button>
    <button onclick="runCode3()">Action 3</button>
</div>

<script>
    function toggleMenu() {
        var menu = document.getElementById("menu");
        menu.style.display = (menu.style.display === "none") ? "block" : "none";
    }

    function runCode1() {
        // Code for Action 1
    }

    function runCode2() {

    function runCode3() {

    }
</script>
</body>
