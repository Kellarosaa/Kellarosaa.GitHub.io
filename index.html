  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Button Execution</title>
    <style>
        #centered {
            position: fixed;
            top: 50%;
            left: 200px;
            transform: translate(-50%, -50%);
            display: none;
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/Kellarosaa/Kellarosaa.GitHub.io/main/IMG_2149.png" alt="Trigger Image" id="triggerImage">

    <div id="centered">
        <!-- Code to Execute -->
        <iframe src="https://kellarosaa.github.io/js-calculator/" style="border:0px #ffffff none;" name="myiFrame" scrolling="no" frameborder="0" marginheight="-500px" marginwidth="0px" height="600px" width="350px" allowfullscreen></iframe>
    </div>

    <script>
        const triggerImage = document.getElementById('triggerImage');
        const centered = document.getElementById('centered');

        triggerImage.addEventListener('click', () => {
            centered.style.display = 'block';
        });

        centered.addEventListener('click', () => {
            centered.style.display = 'none';
        });
    </script>
</body>
</html>
